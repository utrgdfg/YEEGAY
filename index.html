<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yee是gay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: radial-gradient(circle at top left, #ff7ac6 0%, #7a5cff 38%, #2d1b69 70%, #12091f 100%);
      overflow: hidden;
      color: #fff;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.42;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }

    body::before {
      width: 360px;
      height: 360px;
      background: rgba(255, 102, 196, 0.42);
      top: 6%;
      left: 8%;
    }

    body::after {
      width: 460px;
      height: 460px;
      background: rgba(53, 208, 255, 0.24);
      right: 4%;
      bottom: 4%;
      animation-delay: 1.5s;
    }

    .noise {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      opacity: 0.25;
    }

    .stage {
      position: relative;
      z-index: 2;
      width: min(94vw, 1000px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      text-align: center;
      padding: 40px 20px;
    }

    .title {
      font-size: clamp(40px, 7vw, 88px);
      font-weight: 900;
      line-height: 1.05;
      text-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      letter-spacing: 1px;
    }

    .title span {
      display: inline-block;
      padding: 0.1em 0.25em;
      border-radius: 18px;
      background: linear-gradient(90deg, #fff06a, #ff9cf3);
      color: #3f176b;
      transform: rotate(-2deg);
      box-shadow: 0 10px 26px rgba(255, 240, 106, 0.28);
    }

    .sub {
      font-size: clamp(16px, 2vw, 22px);
      opacity: 0.92;
      max-width: 780px;
      line-height: 1.7;
    }

    .play-btn {
      appearance: none;
      border: none;
      cursor: pointer;
      min-width: 260px;
      padding: 24px 54px;
      border-radius: 999px;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 900;
      letter-spacing: 2px;
      color: #3a0d63;
      background: linear-gradient(90deg, #fff06a, #ff8be8 45%, #9ed8ff 100%);
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.32),
        0 0 26px rgba(255, 240, 106, 0.46),
        inset 0 2px 0 rgba(255,255,255,0.55);
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
      animation: pulse 1.6s ease-in-out infinite;
      position: relative;
      z-index: 3;
    }

    .play-btn:hover {
      transform: scale(1.05) translateY(-2px);
      filter: brightness(1.03);
    }

    .play-btn:active {
      transform: scale(0.98);
    }

    .status {
      min-height: 28px;
      font-size: 18px;
      opacity: 0.94;
      text-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    .meme {
      font-size: 15px;
      opacity: 0.78;
      letter-spacing: 1px;
    }

    .popup {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    .popup img {
      width: min(78vw, 760px);
      max-height: 78vh;
      object-fit: contain;
      border-radius: 24px;
      border: 5px solid rgba(255,255,255,0.8);
      box-shadow:
        0 26px 90px rgba(0, 0, 0, 0.5),
        0 0 28px rgba(255, 240, 106, 0.34);
      opacity: 0;
      transform: scale(0.72) rotate(-6deg);
      filter: saturate(1.08) contrast(1.04);
    }

    .popup.show img {
      animation: popFade 2.8s ease forwards;
    }

    .flash-text {
      position: fixed;
      top: 9%;
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      z-index: 11;
      font-size: clamp(24px, 5vw, 56px);
      font-weight: 900;
      color: #fff06a;
      text-shadow:
        0 0 10px rgba(255,240,106,0.9),
        0 0 24px rgba(255,112,204,0.65),
        0 8px 20px rgba(0,0,0,0.35);
      opacity: 0;
      pointer-events: none;
      letter-spacing: 2px;
    }

    .flash-text.show {
      animation: flashText 1.9s ease forwards;
    }

    .shake {
      animation: screenShake 0.35s linear 2;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-20px) translateX(16px); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 20px 50px rgba(0, 0, 0, 0.32), 0 0 26px rgba(255, 240, 106, 0.46), inset 0 2px 0 rgba(255,255,255,0.55); }
      50% { box-shadow: 0 24px 60px rgba(0, 0, 0, 0.38), 0 0 38px rgba(255, 140, 232, 0.56), inset 0 2px 0 rgba(255,255,255,0.62); }
    }

    @keyframes popFade {
      0% {
        opacity: 0;
        transform: scale(0.72) rotate(-6deg);
      }
      18% {
        opacity: 1;
        transform: scale(1.08) rotate(2deg);
      }
      36% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
      72% {
        opacity: 1;
        transform: scale(1.02) rotate(-1deg);
      }
      100% {
        opacity: 0;
        transform: scale(1.18) rotate(3deg);
      }
    }

    @keyframes flashText {
      0% { opacity: 0; transform: translateX(-50%) scale(0.8); }
      20% { opacity: 1; transform: translateX(-50%) scale(1.08); }
      70% { opacity: 1; transform: translateX(-50%) scale(1); }
      100% { opacity: 0; transform: translateX(-50%) scale(1.12); }
    }

    @keyframes screenShake {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-5px, 4px); }
      50% { transform: translate(5px, -4px); }
      75% { transform: translate(-4px, -3px); }
      100% { transform: translate(0, 0); }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="stage" id="stage">
    <div class="title"><span>yee是gay</span></div>
    <div class="sub">虽然很难以置信但yee就是</div>

    <button class="play-btn" id="playBtn">gay</button>
    <div class="status" id="status">准备就绪，点一下试试</div>
    <div class="meme">友情提示：这是真的</div>

    <audio id="audio" src="yinpin.mp3"></audio>
  </div>

  <div class="popup" id="popup">
    <img src="tupian.jpg" alt="弹出图片" id="popupImg" />
  </div>

  <div class="flash-text" id="flashText">GAY</div>

  <script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const status = document.getElementById('status');
    const popup = document.getElementById('popup');
    const flashText = document.getElementById('flashText');
    const stage = document.getElementById('stage');

    function triggerPopup() {
      popup.classList.remove('show');
      flashText.classList.remove('show');
      document.body.classList.remove('shake');

      void popup.offsetWidth;
      void flashText.offsetWidth;

      popup.classList.add('show');
      flashText.classList.add('show');
      document.body.classList.add('shake');

      setTimeout(() => {
        document.body.classList.remove('shake');
      }, 800);
    }

    playBtn.addEventListener('click', async () => {
      triggerPopup();
      status.textContent = '整活启动中...';

      try {
        audio.currentTime = 0;
        await audio.play();
        status.textContent = '语音播放中，图片也已经弹出来了';
      } catch (e) {
        status.textContent = '语音播放失败，请确认 yinpin.mp3 与 HTML 在同一文件夹';
      }
    });

    audio.addEventListener('ended', () => {
      status.textContent = '播放结束，还能再点一次继续整活';
    });
  </script>
</body>
</html>
